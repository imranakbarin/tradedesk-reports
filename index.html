<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TradeDesk Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#0b1120;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}

/* ── Shell ── */
.shell{display:flex;height:100vh}

/* ── Sidebar ── */
.sidebar{width:200px;min-width:200px;background:#0b1120;border-right:1px solid #1e293b;display:flex;flex-direction:column;padding:0;overflow:hidden;transition:width .2s}
.sidebar.collapsed{width:52px;min-width:52px}

.brand{display:flex;align-items:center;gap:10px;padding:18px 14px 14px;border-bottom:1px solid #1e293b;overflow:hidden;white-space:nowrap}
.brand svg{flex-shrink:0}
.brand-text{font-size:14px;font-weight:700;color:#f8fafc;letter-spacing:.02em}
.brand-sub{font-size:10px;color:#475569;margin-top:1px}

.nav{flex:1;padding:10px 6px;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:8px;cursor:pointer;color:#94a3b8;font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;border:none;background:none;width:100%;text-align:left;transition:background .15s,color .15s}
.nav-item:hover{background:#1e293b;color:#e2e8f0}
.nav-item.active{background:#1e3a5f;color:#93c5fd;font-weight:600}
.nav-item svg{flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.nav-label{overflow:hidden;text-overflow:ellipsis}
.nav-badge{margin-left:auto;font-size:10px;padding:2px 6px;border-radius:999px;background:#1e293b;color:#64748b;flex-shrink:0}
.nav-item.active .nav-badge{background:#172554;color:#93c5fd}

.sidebar-toggle{padding:10px 6px;border-top:1px solid #1e293b}
.toggle-btn{display:flex;align-items:center;gap:10px;padding:8px 8px;border-radius:8px;cursor:pointer;color:#475569;font-size:12px;background:none;border:none;width:100%;white-space:nowrap;overflow:hidden}
.toggle-btn:hover{color:#94a3b8;background:#1e293b}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* ── Top strip ── */
.topstrip{height:44px;background:#0f172a;border-bottom:1px solid #1e293b;display:flex;align-items:center;padding:0 18px;gap:12px;flex-shrink:0}
.topstrip-title{font-size:13px;font-weight:600;color:#e2e8f0;flex:1}
.topstrip-url{font-size:11px;color:#334155;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:300px}
.open-btn{background:#1e293b;color:#94a3b8;border:1px solid #334155;border-radius:7px;padding:5px 12px;font-size:12px;cursor:pointer;text-decoration:none;white-space:nowrap;flex-shrink:0}
.open-btn:hover{border-color:#6366f1;color:#e2e8f0}

/* ── Frame area ── */
.frame-area{flex:1;position:relative;overflow:hidden}
iframe{width:100%;height:100%;border:none;display:none}
iframe.active{display:block}

/* ── Home panel ── */
#home-panel{width:100%;height:100%;overflow-y:auto;display:none;background:#0b1120;padding:32px 32px 40px}
#home-panel.active{display:block}

.home-title{font-size:22px;font-weight:700;color:#f8fafc;margin-bottom:4px}
.home-sub{font-size:13px;color:#475569;margin-bottom:28px}

.app-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:32px}
.app-card{background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:20px;cursor:pointer;transition:border-color .15s,background .15s;position:relative;overflow:hidden}
.app-card:hover{border-color:#334155;background:#111827}
.app-card-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.app-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.app-card-title{font-size:15px;font-weight:700;color:#f1f5f9}
.app-card-desc{font-size:11px;color:#475569;margin-top:1px}
.app-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.app-stat{background:#1e293b;border-radius:8px;padding:10px 12px}
.app-stat .sl{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.05em}
.app-stat .sv{font-size:16px;font-weight:700;margin-top:3px;color:#e2e8f0}
.sv.pos{color:#34d399}
.sv.neg{color:#f87171}
.sv.neu{color:#94a3b8}
.app-card-footer{margin-top:14px;padding-top:12px;border-top:1px solid #1e293b;display:flex;align-items:center;justify-content:space-between}
.app-card-date{font-size:11px;color:#475569}
.app-card-link{font-size:12px;color:#6366f1;font-weight:500}

.divider{font-size:10px;color:#334155;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;margin-top:8px}

/* ── Collapsed sidebar icons only ── */
.sidebar.collapsed .nav-label,
.sidebar.collapsed .nav-badge,
.sidebar.collapsed .brand-text,
.sidebar.collapsed .brand-sub,
.sidebar.collapsed .toggle-label{display:none}
.sidebar.collapsed .nav-item{justify-content:center;padding:10px}
.sidebar.collapsed .brand{justify-content:center;padding:14px}
.sidebar.collapsed .toggle-btn{justify-content:center}

@media(max-width:600px){
  .sidebar{width:52px;min-width:52px}
  .sidebar .nav-label,.sidebar .nav-badge,.sidebar .brand-text,.sidebar .brand-sub,.sidebar .toggle-label{display:none}
  .sidebar .nav-item{justify-content:center;padding:10px}
  .sidebar .brand{justify-content:center;padding:14px}
  .sidebar .toggle-btn{display:none}
}
</style>
</head>
<body>
<div class="shell">

<!-- ── Sidebar ── -->
<div class="sidebar" id="sidebar">
  <div class="brand">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <rect width="22" height="22" rx="6" fill="#6366f1"/>
      <path d="M5 15l4-5 3 3 5-7" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div>
      <div class="brand-text">TradeDesk</div>
      <div class="brand-sub">Reports Hub</div>
    </div>
  </div>

  <nav class="nav">
    <button class="nav-item active" data-target="home" onclick="activate(this,'home')">
      <svg width="16" height="16" fill="none" viewBox="0 0 16 16"><path d="M2 6.5L8 2l6 4.5V14a1 1 0 01-1 1H3a1 1 0 01-1-1V6.5z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
      <span class="nav-label">Home</span>
    </button>

    <button class="nav-item" data-target="bot" onclick="activate(this,'bot')">
      <svg width="16" height="16" fill="none" viewBox="0 0 16 16"><rect x="2" y="4" width="12" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M5 4V3a1 1 0 011-1h4a1 1 0 011 1v1" stroke="currentColor" stroke-width="1.4"/><path d="M5 9h6M5 11.5h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      <span class="nav-label">Bot Reports</span>
      <span class="nav-badge" id="bot-badge">—</span>
    </button>

    <button class="nav-item" data-target="scanner" onclick="activate(this,'scanner')">
      <svg width="16" height="16" fill="none" viewBox="0 0 16 16"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.4"/><path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      <span class="nav-label">Scanner</span>
      <span class="nav-badge" id="scanner-badge">—</span>
    </button>

    <button class="nav-item" data-target="codex" onclick="activate(this,'codex')">
      <svg width="16" height="16" fill="none" viewBox="0 0 16 16"><path d="M3 3h10v10H3z" rx="1" stroke="currentColor" stroke-width="1.4"/><path d="M6 6h4M6 8.5h4M6 11h2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      <span class="nav-label">Codex</span>
      <span class="nav-badge" id="codex-badge">—</span>
    </button>
  </nav>

  <div class="sidebar-toggle">
    <button class="toggle-btn" onclick="toggleSidebar()">
      <svg width="16" height="16" fill="none" viewBox="0 0 16 16"><path d="M3 4h10M3 8h10M3 12h6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      <span class="toggle-label">Collapse</span>
    </button>
  </div>
</div>

<!-- ── Main ── -->
<div class="main">
  <div class="topstrip">
    <div class="topstrip-title" id="strip-title">TradeDesk Hub</div>
    <div class="topstrip-url" id="strip-url"></div>
    <a class="open-btn" id="open-btn" href="#" target="_blank" style="display:none">Open in tab ↗</a>
  </div>

  <div class="frame-area">
    <!-- Home panel -->
    <div id="home-panel" class="active">
      <div class="home-title">Good morning, Imran.</div>
      <div class="home-sub" id="home-sub">Loading latest data…</div>

      <div class="app-cards" id="app-cards">
        <!-- Cards injected by JS -->
      </div>
    </div>

    <!-- App iframes -->
    <iframe id="frame-bot"     src="about:blank" data-src="./bot.html"   title="Bot Reports"></iframe>
    <iframe id="frame-scanner" src="about:blank" data-src="./scanner.html" title="Scanner"></iframe>
    <iframe id="frame-codex"   src="about:blank" data-src="./codex/index.html" title="Codex"></iframe>
  </div>
</div>

</div><!-- .shell -->

<script>
const APPS = {
  bot:     { label:'Bot Reports',  url:'./bot.html',       frame:'frame-bot',     badge:'bot-badge'    },
  scanner: { label:'Scanner',      url:'./scanner.html',     frame:'frame-scanner', badge:'scanner-badge' },
  codex:   { label:'Codex',        url:'./codex/index.html', frame:'frame-codex',   badge:'codex-badge'  },
};

let current = 'home';
let sidebarCollapsed = false;

function activate(btn, target) {
  // nav highlight
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // panels
  document.getElementById('home-panel').classList.remove('active');
  document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));

  const strip = document.getElementById('strip-title');
  const urlEl = document.getElementById('strip-url');
  const openBtn = document.getElementById('open-btn');

  if (target === 'home') {
    document.getElementById('home-panel').classList.add('active');
    strip.textContent = 'TradeDesk Hub';
    urlEl.textContent = '';
    openBtn.style.display = 'none';
    current = 'home';
    return;
  }

  const app = APPS[target];
  const frame = document.getElementById(app.frame);

  // lazy-load iframe on first visit
  if (frame.src === 'about:blank' || frame.src === location.href.replace(/index\.html.*/, 'about:blank')) {
    frame.src = app.url;
  }

  frame.classList.add('active');
  strip.textContent = app.label;
  urlEl.textContent = app.url;
  openBtn.href = app.url;
  openBtn.style.display = 'flex';
  current = target;
}

function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed;
  document.getElementById('sidebar').classList.toggle('collapsed', sidebarCollapsed);
  const lbl = document.querySelector('.toggle-label');
  if (lbl) lbl.textContent = sidebarCollapsed ? 'Expand' : 'Collapse';
}

// ── Home panel data ──────────────────────────────────────────────────────────
async function loadHome() {
  const sub = document.getElementById('home-sub');
  const cards = document.getElementById('app-cards');

  const today = new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  sub.textContent = today;

  const html = [];

  // ── Bot card ──────────────────────────────────────────────────────────────
  try {
    const dates = await fetch('./data/dates.json').then(r=>r.json());
    const latest = dates[0];
    document.getElementById('bot-badge').textContent = latest || '—';
    const d = await fetch(`./data/${latest}.json`).then(r=>r.json());

    const primary = (d.trades||[]).filter(t=>!t.status?.startsWith('CONTRA'));
    const netPnl = primary.reduce((s,t)=>s+(t.pnl||0),0);
    const wins = primary.filter(t=>(t.pnl||0)>0).length;
    const wr = primary.length ? Math.round(wins/primary.length*100) : 0;
    const pnlCls = netPnl>0?'pos':netPnl<0?'neg':'neu';
    const pnlStr = (netPnl>=0?'+':'')+'₹'+Math.abs(netPnl).toLocaleString('en-IN',{maximumFractionDigits:0});

    html.push(`
    <div class="app-card" onclick="document.querySelector('[data-target=bot]').click()">
      <div class="app-card-header">
        <div class="app-icon" style="background:#1e1b4b">
          <svg width="18" height="18" fill="none" viewBox="0 0 16 16"><rect x="2" y="4" width="12" height="9" rx="1.5" stroke="#818cf8" stroke-width="1.4"/><path d="M5 4V3a1 1 0 011-1h4a1 1 0 011 1v1" stroke="#818cf8" stroke-width="1.4"/><path d="M5 9h6M5 11.5h4" stroke="#818cf8" stroke-width="1.3" stroke-linecap="round"/></svg>
        </div>
        <div>
          <div class="app-card-title">Bot Reports</div>
          <div class="app-card-desc">Live trading bot — daily P&L &amp; trade log</div>
        </div>
      </div>
      <div class="app-stats">
        <div class="app-stat"><div class="sl">Net P&L</div><div class="sv ${pnlCls}">${pnlStr}</div></div>
        <div class="app-stat"><div class="sl">Trades / WR</div><div class="sv">${primary.length} · ${wr}%</div></div>
      </div>
      <div class="app-card-footer">
        <span class="app-card-date">Latest: ${latest}</span>
        <span class="app-card-link">Open →</span>
      </div>
    </div>`);
  } catch(e) {
    document.getElementById('bot-badge').textContent = 'err';
    html.push(`<div class="app-card" onclick="document.querySelector('[data-target=bot]').click()"><div class="app-card-header"><div class="app-icon" style="background:#1e1b4b"><svg width="18" height="18" fill="none" viewBox="0 0 16 16"><rect x="2" y="4" width="12" height="9" rx="1.5" stroke="#818cf8" stroke-width="1.4"/></svg></div><div><div class="app-card-title">Bot Reports</div><div class="app-card-desc">Could not load latest data</div></div></div><div class="app-card-footer" style="margin-top:14px;padding-top:12px;border-top:1px solid #1e293b;display:flex;justify-content:space-between"><span class="app-card-date">—</span><span class="app-card-link">Open →</span></div></div>`);
  }

  // ── Scanner card ──────────────────────────────────────────────────────────
  try {
    const sdates = await fetch('./scanner/data/dates.json').then(r=>r.json());
    const slatest = sdates[0];
    document.getElementById('scanner-badge').textContent = slatest || '—';
    const sd = await fetch(`./scanner/data/${slatest}.json`).then(r=>r.json());

    const rb = sd.recorded_buys?.summary || {};
    const se = sd.selling?.summary || {};
    const sellNet = se.total != null ? (se.total>=0?'+':'')+'₹'+Math.abs(se.total).toLocaleString('en-IN') : '—';
    const sellCls = (se.total||0)>0?'pos':(se.total||0)<0?'neg':'neu';
    const buyWr = rb.win_rate != null ? rb.win_rate+'%' : '—';

    html.push(`
    <div class="app-card" onclick="document.querySelector('[data-target=scanner]').click()">
      <div class="app-card-header">
        <div class="app-icon" style="background:#052e16">
          <svg width="18" height="18" fill="none" viewBox="0 0 16 16"><circle cx="7" cy="7" r="4.5" stroke="#34d399" stroke-width="1.4"/><path d="M10.5 10.5L14 14" stroke="#34d399" stroke-width="1.4" stroke-linecap="round"/></svg>
        </div>
        <div>
          <div class="app-card-title">Scanner</div>
          <div class="app-card-desc">Options scanner — buys, sells &amp; signals</div>
        </div>
      </div>
      <div class="app-stats">
        <div class="app-stat"><div class="sl">Selling Net</div><div class="sv ${sellCls}">${sellNet}</div></div>
        <div class="app-stat"><div class="sl">Buy WR</div><div class="sv">${buyWr}</div></div>
      </div>
      <div class="app-card-footer">
        <span class="app-card-date">Latest: ${slatest}</span>
        <span class="app-card-link">Open →</span>
      </div>
    </div>`);
  } catch(e) {
    document.getElementById('scanner-badge').textContent = 'err';
    html.push(`<div class="app-card" onclick="document.querySelector('[data-target=scanner]').click()"><div class="app-card-header"><div class="app-icon" style="background:#052e16"><svg width="18" height="18" fill="none" viewBox="0 0 16 16"><circle cx="7" cy="7" r="4.5" stroke="#34d399" stroke-width="1.4"/></svg></div><div><div class="app-card-title">Scanner</div><div class="app-card-desc">Could not load latest data</div></div></div><div class="app-card-footer" style="margin-top:14px;padding-top:12px;border-top:1px solid #1e293b;display:flex;justify-content:space-between"><span class="app-card-date">—</span><span class="app-card-link">Open →</span></div></div>`);
  }

  // ── Codex card ────────────────────────────────────────────────────────────
  document.getElementById('codex-badge').textContent = 'live';
  html.push(`
  <div class="app-card" onclick="document.querySelector('[data-target=codex]').click()">
    <div class="app-card-header">
      <div class="app-icon" style="background:#1c1917">
        <svg width="18" height="18" fill="none" viewBox="0 0 16 16"><path d="M3 3h10v10H3z" stroke="#fb923c" stroke-width="1.4"/><path d="M6 6h4M6 8.5h4M6 11h2" stroke="#fb923c" stroke-width="1.3" stroke-linecap="round"/></svg>
      </div>
      <div>
        <div class="app-card-title">Codex</div>
        <div class="app-card-desc">Post-market deep analysis &amp; playbooks</div>
      </div>
    </div>
    <div style="margin-top:12px;font-size:12px;color:#475569;line-height:1.6">
      Options-buying &amp; selling post-market reports.<br>Written after each session.
    </div>
    <div class="app-card-footer">
      <span class="app-card-date">Updated daily</span>
      <span class="app-card-link">Open →</span>
    </div>
  </div>`);

  cards.innerHTML = html.join('');
}

loadHome();
</script>
</body>
</html>
